<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

<body>
  <script>
     const songs = ["Kesariya", "Believer", "Perfect", "Senorita"];
    console.log("=== do-while playlist ===");
    let k = 0;
    do {
      console.log(k + ": " + songs[k]);
      k++;
    } while (k < songs.length);
  </script>
</body>
