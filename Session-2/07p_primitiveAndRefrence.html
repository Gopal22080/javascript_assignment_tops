<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
    <h1>Primitive vs Reference Types Demo</h1>

    <script>
      
      let user1 = "Priya";
      let User2 = user1;

      user1 = "Riya";


      //console.log(user1);
      
      console.log("Primitive Types");
      console.log("user1 : ",user1);
      console.log("user2 :",User2);

      console.log("Refrence Type");
      let favApp1 = ["Instaram ", "Facebook ", "Whatsapp"];
      let favApp2 = favApp1;
      
      //console.log(favApp2);
      console.log("favApp1 :", favApp1);
      console.log("favApp2 :", favApp2);      

    </script>

</body>
</html>
